<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign In | Globalpack Shipping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#172033; --muted:#667085; --line:#d8e0ea; --brand:#1769e0; --brand-dark:#0f4fb0; --accent:#14b8a6; --soft:#f4f7fb; --white:#fff; --shadow:0 24px 70px rgba(23,32,51,.14); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,Arial,sans-serif; color:var(--ink); background:linear-gradient(135deg,#eef5ff 0%,#f7fbf8 60%,#fff 100%); display:grid; place-items:center; padding:24px; }
    .shell { width:min(980px,100%); display:grid; grid-template-columns:.95fr 1.05fr; background:#fff; border:1px solid var(--line); border-radius:8px; overflow:hidden; box-shadow:var(--shadow); }
    .side { padding:42px; background:#10294e; color:#fff; display:flex; flex-direction:column; justify-content:space-between; min-height:560px; }
    .brand { font-weight:800; font-size:22px; }
    .side h1 { font-size:42px; line-height:1.05; margin:0 0 16px; letter-spacing:0; }
    .side p { color:rgba(255,255,255,.78); line-height:1.7; margin:0; }
    .auth { padding:42px; display:grid; align-content:center; }
    .eyebrow { color:var(--brand); font-weight:800; font-size:13px; text-transform:uppercase; letter-spacing:0; }
    h2 { margin:10px 0 8px; font-size:32px; letter-spacing:0; }
    .hint { color:var(--muted); line-height:1.6; margin:0 0 24px; }
    label { display:block; margin:14px 0 7px; color:#344054; font-weight:700; font-size:14px; }
    input { width:100%; border:1px solid var(--line); border-radius:6px; padding:13px 14px; font:inherit; outline:none; }
    input:focus { border-color:var(--brand); box-shadow:0 0 0 4px rgba(23,105,224,.12); }
    .btn { width:100%; border:0; border-radius:6px; padding:14px 18px; min-height:48px; font-weight:800; font-size:15px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .btn-primary { background:var(--brand); color:#fff; margin-top:22px; box-shadow:0 14px 28px rgba(23,105,224,.24); }
    .btn-primary:hover { background:var(--brand-dark); }
    .switch { text-align:center; color:var(--muted); margin-top:20px; }
    .switch a { color:var(--brand); font-weight:800; text-decoration:none; }
    @media (max-width:780px) { .shell { grid-template-columns:1fr; } .side { min-height:auto; gap:42px; padding:30px; } .side h1 { font-size:34px; } .auth { padding:30px; } }
  </style>
</head>
<body>
  <main class="shell">
    <section class="side">
      <div class="brand">Globalpack Shipping</div>
      <div>
        <h1>Welcome back to your dashboard.</h1>
        <p>Sign in to continue tracking your activity, referral link, and client progress.</p>
      </div>
    </section>
    <form class="auth" id="signinForm">
      <div class="eyebrow">Existing account</div>
      <h2>Sign in</h2>
      <p class="hint">Enter your account details. Successful sign in opens the dashboard.</p>
      <label for="email">Email or username</label>
      <input id="email" name="email" autocomplete="username" required placeholder="you@example.com" />
      <label for="password">Password</label>
      <input id="password" name="password" type="password" autocomplete="current-password" required placeholder="Your password" />
      <button class="btn btn-primary" type="submit">Sign in</button>
      <p class="switch">Need an account? <a href="sign up.html">Create one</a></p>
    </form>
  </main>
  <script>
    document.getElementById('signinForm').addEventListener('submit', function (event) {
      event.preventDefault();
      const login = document.getElementById('email').value.trim();
      const existingName = localStorage.getItem('clientName');
      if (!existingName && login) {
        localStorage.setItem('clientName', login.split('@')[0] || 'Sandra');
      }
      if (!localStorage.getItem('referrerName')) {
        localStorage.setItem('referrerName', 'Sandra');
      }
      localStorage.setItem('signedIn', 'true');
      window.location.href = 'dashboard.html';
    });
  </script>
</body>
</html>

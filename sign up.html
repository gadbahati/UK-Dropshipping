            if(!confirm("Confirm selection:\nPlan: " + plan + "\nAmount: " + amount + " KES\n\nProceed with this booking?")) return false;

            var ajaxUrl = "https://live-dropshipment.pantheonsite.io/wp-admin/admin-ajax.php";
            var data = "action=start_shipping_task&amount=" + parseInt(amount) + "&profit=" + parseInt(profit) + "&plan=" + encodeURIComponent(plan);

            fetch(ajaxUrl, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8'
                },
                body: data
            })
            .then(function(res) {
                return res.text();
            })
            .then(function(responseText) {
                var cleanResponse = responseText.trim();
                alert(cleanResponse);
                
                if (cleanResponse.indexOf("Booking successful") !== -1) {
                    window.location.href = "https://live-dropshipment.pantheonsite.io/bookings/";
                }
            })
            .catch(function(err) {
                alert("Network error: Could not process booking request.");
                console.error("Shipping Application Error:", err);
            });
        };
    }

.fixed-container {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  z-index: 9999;
  background: #fff; /* Optional for visibility */
}



/* 🌈 Glowing rainbow border moving around all edges */
.rainbow-loop-button {
  position: relative;
  display: inline-block;
  padding: 6px 6px;
  color: #fff;
  background: #111;
  border-radius: 10px;
  font-weight: 600;
  border: 6px;
  overflow: hidden;
  cursor: pointer;
  z-index: 1;
}

/* The animated rainbow glow border */
.rainbow-loop-button::before {
  content: "";
  position: absolute;
  inset: 0;
  padding: 4px; /* border thickness */
  border-radius: inherit;
  background: linear-gradient(
    0deg,
    red,
    orange,
    yellow,
    green,
    cyan,
    blue,
    violet,
    red
  );
  background-size: 400% 400%;
  -webkit-mask: 
    linear-gradient(#000 0 0) content-box, 
    linear-gradient(#000 0 0);
  -webkit-mask-composite: xor;
  mask-composite: exclude;
  animation: moveRainbowBorder 10s linear infinite;
  filter: blur(4px); /* glow softness */
  z-index: -1;
}

/* Inner dark area */
.rainbow-loop-button::after {
  content: "";
  position: absolute;
  top: 2px;
  left: 2px;
  right: 2px;
  bottom: 2px;
  background: #111;
  border-radius: inherit;
  z-index: -1;
}

/* Animate border traveling around the button edges */
@keyframes moveRainbowBorder {
  0% {
    background-position: 0% 0%;
  }
  25% {
    background-position: 100% 0%;
  }
  50% {
    background-position: 100% 100%;
  }
  75% {
    background-position: 0% 100%;
  }
  100% {
    background-position: 0% 0%;
  }
}
.fixed-footer {
  position: fixed;   /* Fixes the container relative to the viewport */
  bottom: 0;         /* Aligns it to the bottom */
  left: 0;           /* Start from the left */
  width: 100%;       /* Full width */
  background-color: #2A365F;  /* Background color */
  color: white;           /* Text color */
  padding: 15px;          /* Some padding */
  text-align: center;     /* Center text */
  z-index: 9999;          /* Make sure it's on top of other elements */
}


.rainbow-bounce-number {
    display: inline-block;
    font-size: 32px;
    font-weight: bold;
    animation: 
        bounce 0.5s infinite ease-in-out,
        rainbow 2s linear infinite;
}

/* Bounce animation */
@keyframes bounce {
    0%, 100% {
        transform: translateY(0);
    }
    50% {
        transform: translateY(-12px);
    }
}

/* Rainbow color change */
@keyframes rainbow {
    0%   { color: red; }
    14%  { color: orange; }
    28%  { color: yellow; }
    42%  { color: green; }
    57%  { color: blue; }
    71%  { color: indigo; }
    85%  { color: violet; }
    100% { color: red; }
}

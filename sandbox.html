<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Globalpack Shipping | Sandbox Notice</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#172033; --muted:#667085; --line:#d8e0ea; --brand:#1769e0; --brand-dark:#0f4fb0; --accent:#14b8a6; --white:#fff; --shadow:0 24px 70px rgba(23,32,51,.14); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,Arial,sans-serif; color:var(--ink); background:linear-gradient(135deg,#eef5ff 0%,#f7fbf8 48%,#fff 100%); display:grid; place-items:center; padding:24px; }
    .notice { width:min(720px,100%); background:rgba(255,255,255,.92); border:1px solid rgba(216,224,234,.9); border-radius:8px; box-shadow:var(--shadow); padding:42px; }
    .badge { display:inline-flex; gap:8px; align-items:center; padding:8px 12px; border-radius:999px; background:#e9f7f5; color:#0f766e; font-weight:700; font-size:13px; }
    .dot { width:9px; height:9px; border-radius:50%; background:var(--accent); box-shadow:0 0 0 5px rgba(20,184,166,.16); }
    h1 { font-size:clamp(32px,5vw,54px); line-height:1.02; margin:22px 0 14px; letter-spacing:0; }
    p { color:var(--muted); font-size:18px; line-height:1.7; margin:0 0 24px; max-width:58ch; }
    .warning { border-left:4px solid #f59e0b; background:#fff8e8; color:#744210; padding:14px 16px; border-radius:6px; margin:24px 0; }
    .actions { display:flex; flex-wrap:wrap; gap:12px; align-items:center; }
    .btn { border:0; border-radius:6px; padding:14px 18px; min-height:48px; font-weight:800; font-size:15px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    .btn-primary { background:var(--brand); color:#fff; box-shadow:0 14px 28px rgba(23,105,224,.25); }
    .btn-primary:hover { background:var(--brand-dark); }
    .btn-secondary { background:#fff; color:var(--ink); border:1px solid var(--line); }
    @media (max-width:560px) { .notice { padding:28px; } .actions { align-items:stretch; flex-direction:column; } .btn { width:100%; } }
  </style>
</head>
<body>
  <main class="notice">
    <span class="badge"><span class="dot"></span> Sandbox environment</span>
    <h1>Globalpack Shipping is running in a sandbox environment.</h1>
    <p>This preview is used for testing the account flow before the live service is connected.</p>
    <div class="warning"><strong>Important:</strong> avoid entering real financial information while this environment is in sandbox mode.</div>
    <div class="actions">
      <button class="btn btn-primary" type="button" onclick="continueToSignup()">Continue</button>
      <button class="btn btn-primary" type="button" onclick="continueToSignup()">Next</button>
      <a class="btn btn-secondary" href="sign in.html">I already have an account</a>
    </div>
  </main>
  <script>
    function continueToSignup() {
      localStorage.setItem('sandboxAccepted', 'true');
      window.location.href = 'sign up.html';
    }
  </script>
</body>
</html>

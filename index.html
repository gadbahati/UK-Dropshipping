
<!DOCTYPE html>
<html lang="en">
<head>
    <!-- WCAG 2.4.2: Added a descriptive title for the page. -->
    <title>Sandbox Environment Notice</title>
    
    <!-- Standard meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet" />
    
    <script>
        function cont() {
            document.cookie = "Deterrence-Bypass=1; domain=live-dropshipment.pantheonsite.io; path=/; max-age=86400;";
            window.location.reload();
        }
    </script>
    
    <style>
        /* Using a more modern and accessible CSS reset */
        :root {
            --primary-color: rgb(79 50 206);
            --text-color: rgb(35 35 45);
            --background-color: rgb(255 255 255);
            --focus-outline: 2px solid var(--primary-color);
        }

        body {
            /* WCAG 1.4.3, 1.4.4: Using relative units and ensuring high contrast */
            color: var(--text-color);
            background-color: var(--background-color);
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            line-height: 1.6;
            margin: 0;
            padding: 1rem;
            min-height: 100vh;
            
            /* Center the main content */
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* WCAG 2.4.1: Added a skip link for keyboard users */
        .skip-link {
            border: 0;
            clip: rect(1px, 1px, 1px, 1px);
            clip-path: inset(50%);
            height: 1px;
            margin: -1px;
            overflow: hidden;
            padding: 0;
            position: absolute;
            width: 1px;
            white-space: nowrap;
        }

        .skip-link:focus {
            clip: auto;
            clip-path: none;
            width: auto;
            height: auto;
            position: absolute;
            top: 1rem;
            left: 1rem;
            background-color: var(--primary-color);
            color: var(--background-color);
            padding: 0.5rem 1rem;
            z-index: 100;
            text-decoration: none;
            border-radius: 3px;
        }


        /* WCAG 1.3.1, 4.1.2: Using semantic <main> tag for the primary content */
        main {
            max-width: 45rem;
            width: 100%;
        }

        h1 {
            /* WCAG 1.4.4: Using rem units for scalable text */
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
        }

        p {
            font-size: 1.1rem;
            margin: 1rem 0;
        }

        .pds-button {
            background-color: var(--primary-color);
            border: 1px solid var(--primary-color);
            color: var(--background-color);
            border-radius: 0.1875rem;
            box-sizing: border-box;
            cursor: pointer;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            font-weight: 600;
            height: 2.5rem;
            padding: 0.625rem 1rem;
            text-decoration: none;
            transition: all 0.2s ease-in-out;
            white-space: nowrap;
            margin-top: 1.5rem;
        }

        /* WCAG 1.4.11, 2.1.1: Ensuring clear focus states for keyboard users */
        .pds-button:focus,
        .pds-button:hover {
            outline: var(--focus-outline);
            outline-offset: 2px;
            opacity: 0.9;
        }

        /* Responsive adjustments for smaller screens */
        @media (max-width: 699px) {
            h1 {
                font-size: 1.75rem;
            }
            p {
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <!-- WCAG 2.4.1: This link is the first focusable item for keyboard users. -->
    <a href="#main-content" class="skip-link">Skip to main content</a>

    <!-- WCAG 1.3.1: Proper semantic structure with a <main> element -->
    <main id="main-content">
        <h1>This website is hosted in a sandbox environment.</h1>
        <p>Sandboxes are typically used for development and testing purposes.</p>
        <p><strong>Be cautious before entering any personal or financial information.</strong></p>
        
        <!-- WCAG 4.1.2: The button has an accessible name from its content. -->
        <button class="pds-button" onclick='cont()'>Continue</button>
    </main>

</body>
</html>

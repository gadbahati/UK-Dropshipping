<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin Login | Globalpack Shipping</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --ink:#172033; --muted:#667085; --line:#d8e0ea; --brand:#1769e0; --brand-dark:#0f4fb0; --white:#fff; --shadow:0 24px 70px rgba(23,32,51,.14); }
    * { box-sizing:border-box; }
    body { margin:0; min-height:100vh; font-family:Inter,Arial,sans-serif; background:linear-gradient(135deg,#10294e,#1769e0); display:grid; place-items:center; padding:24px; color:var(--ink); }
    .card { width:min(460px,100%); background:#fff; border-radius:8px; box-shadow:var(--shadow); padding:34px; border:1px solid var(--line); }
    .eyebrow { color:var(--brand); font-size:13px; font-weight:900; text-transform:uppercase; }
    h1 { margin:10px 0 8px; font-size:32px; letter-spacing:0; }
    p { margin:0 0 22px; color:var(--muted); line-height:1.6; }
    label { display:block; margin:14px 0 7px; color:#344054; font-weight:800; font-size:14px; }
    input { width:100%; border:1px solid var(--line); border-radius:6px; padding:13px 14px; font:inherit; outline:none; }
    input:focus { border-color:var(--brand); box-shadow:0 0 0 4px rgba(23,105,224,.12); }
    button,a.btn { width:100%; border:0; border-radius:6px; padding:14px 18px; min-height:48px; font-weight:900; font-size:15px; cursor:pointer; text-decoration:none; display:inline-flex; align-items:center; justify-content:center; }
    button { background:var(--brand); color:#fff; margin-top:22px; } button:hover { background:var(--brand-dark); }
    a.btn { margin-top:10px; background:#f4f7fb; color:var(--ink); }
    .message { margin-top:14px; color:#b42318; font-weight:800; }
  </style>
</head>
<body>
  <main class="card">
    <div class="eyebrow">Admin Control</div>
    <h1>Verified admin login</h1>
    <p>Only the configured administrator credentials can open Admin Control.</p>
    <form id="adminLoginForm">
      <label for="email">Admin email</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Admin password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button type="submit">Open Admin Control</button>
      <p class="message" id="message" role="alert"></p>
      <a class="btn" href="index.html">Return home</a>
    </form>
  </main>
  <script>
    const ADMIN_EMAIL = 'dropshimpent.ecommerce@gmail.com';
    const ADMIN_PASSWORD = 'Almah@203';
    document.getElementById('adminLoginForm').addEventListener('submit', function(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      if (email !== ADMIN_EMAIL || password !== ADMIN_PASSWORD) {
        localStorage.removeItem('adminSession');
        document.getElementById('message').textContent = 'Access denied. Invalid administrator credentials.';
        return;
      }
      localStorage.setItem('adminSession', ADMIN_EMAIL);
      localStorage.setItem('signedIn', 'true');
      localStorage.setItem('clientName', 'Administrator');
      window.location.href = 'admin.html';
    });
  </script>
</body>
</html>
